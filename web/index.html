<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Calc Noir - calculatrice Flutter mobile et web au design premium.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calc Noir">
  <link rel="manifest" href="manifest.json">
  <title>Calc Noir</title>
  <style>
    html, body { margin: 0; height: 100%; background: #050505; overflow: hidden; }
    .loader { position: fixed; inset: 0; display: grid; place-items: center; color: #fff; font-family: Arial, sans-serif; background: radial-gradient(circle at top right, rgba(229,9,20,.28), transparent 38%), #050505; }
    .pulse { width: 72px; height: 72px; border-radius: 24px; background: linear-gradient(135deg, #e50914, #b6ff00); animation: pulse 1.05s infinite alternate ease-in-out; }
    @keyframes pulse { from { transform: scale(.82) rotate(0deg); opacity: .58; } to { transform: scale(1) rotate(12deg); opacity: 1; } }
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="pulse"></div></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loader');
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
